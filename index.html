<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON BREAKER // Retro Synthwave Arcade</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="game-container">
    <!-- Heads-Up Display -->
    <header class="hud">
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span id="score-val" class="hud-value neon-cyan">000000</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">HIGH</span>
        <span id="high-val" class="hud-value neon-pink">000000</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">LEVEL</span>
        <span id="level-val" class="hud-value neon-yellow">1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">LIVES</span>
        <div id="lives-container" class="lives-container">
          <!-- Dynamically populated hearts or indicators -->
        </div>
      </div>
    </header>

    <!-- Main Game Canvas -->
    <div class="canvas-wrapper">
      <canvas id="game-canvas"></canvas>

      <!-- Overlay Screens -->
      <!-- Start Screen -->
      <div id="start-screen" class="overlay active">
        <h1 class="game-title neon-text-pink">NEON<br><span class="neon-text-cyan">BREAKER</span></h1>
        <p class="game-subtitle">RETRO SYNTHWAVE ARCADE</p>
        <button id="start-btn" class="neon-btn cyan-btn">INSERT COIN (START)</button>
        <div class="instructions">
          <p>← / → or A / D to Move Paddle | Space to Launch Ball / Fire Lasers</p>
          <p>You can also use Mouse / Touch control</p>
        </div>
      </div>

      <!-- Pause Screen -->
      <div id="pause-screen" class="overlay">
        <h2 class="overlay-title neon-text-yellow">PAUSED</h2>
        <button id="resume-btn" class="neon-btn yellow-btn">RESUME</button>
      </div>

      <!-- Game Over Screen -->
      <div id="game-over-screen" class="overlay">
        <h2 class="overlay-title neon-text-pink">GAME OVER</h2>
        <p class="final-score-text">SCORE: <span id="final-score" class="neon-cyan">0</span></p>
        <button id="restart-btn" class="neon-btn pink-btn">RETRY</button>
      </div>

      <!-- Game Win Screen -->
      <div id="win-screen" class="overlay">
        <h2 class="overlay-title neon-text-cyan">VICTORY</h2>
        <p class="win-subtitle">YOU HAVE SAVED THE CYBERGRID!</p>
        <p class="final-score-text">SCORE: <span id="win-score" class="neon-cyan">0</span></p>
        <button id="win-restart-btn" class="neon-btn cyan-btn">PLAY AGAIN</button>
      </div>
    </div>

    <!-- Footer / Control Status -->
    <footer class="footer">
      <div class="control-hints">
        <span class="badge">MOUSE / TOUCH</span>
        <span class="badge">KEYBOARD</span>
      </div>
      <button id="mute-btn" class="mute-btn" title="Toggle Sound">
        <svg id="sound-on-icon" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <svg id="sound-off-icon" viewBox="0 0 24 24" class="hidden">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
      </button>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
